name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # 12時間ごとに更新
  workflow_dispatch:          # 手動実行も可
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=2DE8B0&color_dots=161b22,2DE8B0,C9A84C,C9A84C,ffffff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
